<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realtime Chat</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.chat-container{
    width:700px;
    margin:auto;
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

#chatBox{
    height:450px;
    overflow-y:auto;
    border:1px solid #ddd;
    padding:10px;
    margin-bottom:10px;
}

.message{
    margin-bottom:10px;
    padding:10px;
    border-radius:8px;
    background:#f1f1f1;
}

.message b{
    color:#2563eb;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

#username{
    width:150px;
}

#message{
    flex:1;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

</style>
</head>

<body>

<div class="chat-container">

<h2>Realtime Firebase Chat</h2>

<div style="margin-bottom:10px;">
    <input type="text"
           id="username"
           placeholder="Your Name">
</div>

<div id="chatBox"></div>

<div class="input-group">

    <input type="text"
           id="message"
           placeholder="Type message">

    <button onclick="sendMessage()">
        Send
    </button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getFirestore,
    collection,
    addDoc,
    query,
    orderBy,
    onSnapshot,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

    apiKey: "AIzaSyAlOrIXWqq1XEe1ya6UYx_csH6ckvo_x84",

    authDomain:
    "project-dashboard-ee104.firebaseapp.com",

    projectId:
    "project-dashboard-ee104",

    storageBucket:
    "project-dashboard-ee104.firebasestorage.app",

    messagingSenderId:
    "462837501926",

    appId:
    "1:462837501926:web:aed16fc192890d16115027"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const chatRef =
    collection(db,"chat_messages");


window.sendMessage =
async function(){

    let username =
        document
        .getElementById("username")
        .value
        .trim();

    let message =
        document
        .getElementById("message")
        .value
        .trim();

    if(username === ""){
        alert("Enter Name");
        return;
    }

    if(message === ""){
        return;
    }

    await addDoc(
        chatRef,
        {
            username: username,
            message: message,
            created_at:
            serverTimestamp()
        }
    );

    document
    .getElementById("message")
    .value = "";
};


const q = query(
    chatRef,
    orderBy("created_at","asc")
);

onSnapshot(
    q,
    (snapshot)=>{

        let html = "";

        snapshot.forEach((doc)=>{

            let data =
                doc.data();

            html += `
            <div class="message">
                <b>${data.username}</b><br>
                ${data.message}
            </div>
            `;

        });

        document
        .getElementById("chatBox")
        .innerHTML = html;

        document
        .getElementById("chatBox")
        .scrollTop =
        document
        .getElementById("chatBox")
        .scrollHeight;

    }
);


document
.getElementById("message")
.addEventListener(
    "keypress",
    function(e){

        if(e.key==="Enter"){

            sendMessage();

        }

    }
);

</script>

</body>
</html>
