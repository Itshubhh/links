<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Secure Project Dashboard
</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<style>

body{
background:#f1f5f9;
font-family:Arial;
padding:20px;
font-size:13px;
}

/* DASHBOARD HIDE */

#mainDashboard{
display:none;
}

/* LOGIN OVERLAY */

#loginOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
135deg,
#0f172a,
#1e293b
);
display:flex;
justify-content:center;
align-items:center;
z-index:999999;
padding:20px;
}

/* LOGIN CARD */

.login-card{
width:100%;
max-width:420px;
background:white;
border-radius:24px;
overflow:hidden;
box-shadow:
0 20px 60px rgba(0,0,0,0.25);
animation:popup .35s ease;
}

@keyframes popup{

from{
transform:translateY(30px) scale(.9);
opacity:0;
}

to{
transform:translateY(0px) scale(1);
opacity:1;
}

}

.login-header{
background:#2563eb;
padding:35px 25px;
text-align:center;
color:white;
}

.login-header i{
font-size:55px;
margin-bottom:15px;
}

.login-body{
padding:30px;
}

.login-input{
height:52px;
border-radius:14px;
font-size:15px;
padding-left:15px;
border:1px solid #dbe4f0;
}

.login-input:focus{
box-shadow:none;
border-color:#2563eb;
}

.login-btn{
height:52px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:15px;
font-weight:600;
width:100%;
transition:.3s;
}

.login-btn:hover{
background:#1d4ed8;
}

.login-error{
display:none;
background:#fee2e2;
color:#dc2626;
padding:12px;
border-radius:12px;
font-size:13px;
margin-top:15px;
text-align:center;
font-weight:600;
}

.login-footer{
text-align:center;
font-size:12px;
color:#64748b;
margin-top:20px;
}

/* DASHBOARD */

.card-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0px 5px 20px rgba(0,0,0,0.05);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.btn-main{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
font-size:12px;
}

.search-input,
.filter-select{
height:40px;
border:1px solid #dbe4f0;
border-radius:10px;
padding:0px 10px;
font-size:12px;
}

.project-img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.status{
padding:5px 12px;
border-radius:20px;
font-size:11px;
font-weight:bold;
}

.active{
background:#dcfce7;
color:#166534;
}

.pending{
background:#fef3c7;
color:#92400e;
}

.completed{
background:#dbeafe;
color:#1d4ed8;
}

.action-btn{
width:32px;
height:32px;
border:none;
border-radius:8px;
color:white;
font-size:11px;
}

.edit-btn{
background:#f59e0b;
}

.delete-btn{
background:#ef4444;
}

.visit-btn{
background:#2563eb;
color:white;
padding:6px 10px;
border-radius:8px;
text-decoration:none;
font-size:11px;
}

.table thead{
background:#111827;
color:white;
}

.table thead th{
font-size:12px;
}

.table tbody td{
font-size:12px;
vertical-align:middle;
}

.modal-content{
border-radius:15px;
}

.modal-header{
background:#2563eb;
color:white;
}

.form-control,
.form-select{
font-size:12px;
border-radius:10px;
height:42px;
}

.notification-box{
background:#eff6ff;
border:1px solid #bfdbfe;
padding:10px;
border-radius:10px;
font-size:12px;
margin-bottom:15px;
color:#1e3a8a;
}

</style>

</head>

<body>

<!-- LOGIN POPUP -->

<div id="loginOverlay">

<div class="login-card">

<div class="login-header">

<i class="fa fa-shield-halved"></i>

<h3 class="mb-1">
Secure Dashboard
</h3>

<p class="mb-0">
Authentication Required
</p>

</div>

<div class="login-body">

<input
type="password"
id="loginPassword"
class="form-control login-input mb-3"
placeholder="Enter Password"
>

<button
id="loginBtn"
class="login-btn">

<i class="fa fa-lock"></i>

Login Dashboard

</button>

<div
id="loginError"
class="login-error">

Wrong Password

</div>

<div class="login-footer">

Session expires in 1 minute

</div>

</div>

</div>

</div>

<!-- DASHBOARD -->

<div id="mainDashboard">

<div class="card-box">

<div class="notification-box">

<i class="fa fa-bell"></i>

Projects

</div>

<div class="topbar">

<div>

<h3>
Project Dashboard
</h3>

</div>

<div class="d-flex gap-2 flex-wrap">

<input type="text"
id="searchInput"
class="search-input"
placeholder="Search">

<select id="statusFilter"
class="filter-select">

<option value="">
All Status
</option>

<option value="Active">
Active
</option>

<option value="Pending">
Pending
</option>

<option value="Completed">
Completed
</option>

</select>

<button class="btn-main"
data-bs-toggle="modal"
data-bs-target="#projectModal">

<i class="fa fa-plus"></i>

Add Project

</button>

</div>

</div>

<div class="table-responsive">

<table id="projectTable"
class="table table-bordered align-middle">

<thead>

<tr>

<th>#</th>
<th>Image</th>
<th>Project</th>
<th>Description</th>
<th>Status</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="tableBody">

<tr>

<td>1</td>

<td>
<img src="https://i.ibb.co/0jdbf75Y/image.png"
class="project-img">
</td>

<td>
<b>Demo Project</b>
</td>

<td>
Professional Dashboard
</td>

<td>
<span class="status active">
Active
</span>
</td>

<td>

<button class="action-btn edit-btn">

<i class="fa fa-pen"></i>

</button>

<button class="action-btn delete-btn">

<i class="fa fa-trash"></i>

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<!-- ADD PROJECT MODAL -->

<div class="modal fade"
id="projectModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5>
Add Project
</h5>

<button class="btn-close btn-close-white"
data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form>

<div class="row">

<div class="col-md-6 mb-3">

<label>
Project Name
</label>

<input type="text"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>
Image URL
</label>

<input type="text"
class="form-control">

</div>

</div>

<button class="btn-main w-100">

Save Project

</button>

</form>

</div>

</div>

</div>

</div>

<script>

/* PASSWORD */

const dashboardPassword = "Shubh";

/* 1 MINUTE */

const sessionTime = 60000;

/* SESSION */

const loginData =
JSON.parse(
sessionStorage.getItem(
'dashboard_login'
)
);

let validSession = false;

/* CHECK SESSION */

if(
loginData &&
(Date.now() - loginData.loginTime)
< sessionTime
){

validSession = true;

}

/* OPEN DASHBOARD */

function openDashboard(){

document
.getElementById(
'loginOverlay'
)
.style.display = 'none';

document
.getElementById(
'mainDashboard'
)
.style.display = 'block';

}

/* VALID SESSION */

if(validSession){

openDashboard();

}else{

document
.getElementById(
'loginBtn'
)
.addEventListener(
'click',
()=>{

const password =
document
.getElementById(
'loginPassword'
)
.value;

if(password === dashboardPassword){

sessionStorage.setItem(
'dashboard_login',
JSON.stringify({
loginTime: Date.now()
})
);

openDashboard();

}else{

document
.getElementById(
'loginError'
)
.style.display = 'block';

}

}
);

document
.getElementById(
'loginPassword'
)
.addEventListener(
'keypress',
function(e){

if(e.key === 'Enter'){

document
.getElementById(
'loginBtn'
)
.click();

}

}
);

}

/* AUTO EXPIRE */

setTimeout(()=>{

sessionStorage.removeItem(
'dashboard_login'
);

location.reload();

}, sessionTime);

/* DATATABLE */

$(document).ready(function(){

$('#projectTable').DataTable();

});

</script>

</body>

</html>
