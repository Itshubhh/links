<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Project Dashboard
</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

<script src="https://cdn.datatables.net/1.13.8/js/dataTables.bootstrap5.min.js"></script>

<style>

body{
background:#f1f5f9;
font-family:Arial;
padding:20px;
font-size:13px;
}

.card-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0px 5px 20px rgba(0,0,0,0.05);
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

.btn-main{
background:#2563eb;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
font-size:12px;
}

.search-input,
.filter-select{
height:40px;
border:1px solid #dbe4f0;
border-radius:10px;
padding:0px 10px;
font-size:12px;
}

.project-img{
width:55px;
height:55px;
border-radius:10px;
object-fit:cover;
}

.status{
padding:5px 12px;
border-radius:20px;
font-size:11px;
font-weight:bold;
}

.active{
background:#dcfce7;
color:#166534;
}

.pending{
background:#fef3c7;
color:#92400e;
}

.completed{
background:#dbeafe;
color:#1d4ed8;
}

.action-btn{
width:32px;
height:32px;
border:none;
border-radius:8px;
color:white;
font-size:11px;
}

.edit-btn{
background:#f59e0b;
}

.delete-btn{
background:#ef4444;
}

.visit-btn{
background:#2563eb;
color:white;
padding:6px 10px;
border-radius:8px;
text-decoration:none;
font-size:11px;
}

.table thead{
background:#111827;
color:white;
}

.table thead th{
font-size:12px;
}

.table tbody td{
font-size:12px;
vertical-align:middle;
}

.modal-content{
border-radius:15px;
}

.modal-header{
background:#2563eb;
color:white;
}

.form-control,
.form-select{
font-size:12px;
border-radius:10px;
height:42px;
}

textarea.form-control{
height:auto;
}

.notification-box{
background:#eff6ff;
border:1px solid #bfdbfe;
padding:10px;
border-radius:10px;
font-size:12px;
margin-bottom:15px;
color:#1e3a8a;
}

@media(max-width:768px){

.topbar{
flex-direction:column;
align-items:stretch;
}

.search-input{
width:100%;
}

.btn-main{
width:100%;
}

}

</style>

</head>

<body>

<div class="card-box">

<div class="notification-box">

<i class="fa fa-bell"></i>

Realtime Firebase Notification Enabled

</div>

<div class="topbar">

<div>

<h3>
Project Dashboard
</h3>

<p class="text-muted mb-0">
Firebase CRUD + Notifications
</p>

</div>

<div class="d-flex gap-2 flex-wrap">

<input type="text"
id="searchInput"
class="search-input"
placeholder="Search">

<select id="statusFilter"
class="filter-select">

<option value="">
All Status
</option>

<option value="Active">
Active
</option>

<option value="Pending">
Pending
</option>

<option value="Completed">
Completed
</option>

</select>

<button class="btn-main"
data-bs-toggle="modal"
data-bs-target="#projectModal">

<i class="fa fa-plus"></i>

Add Project

</button>

</div>

</div>

<div class="table-responsive">

<table id="projectTable"
class="table table-bordered align-middle">

<thead>

<tr>

<th>#</th>
<th>Image</th>
<th>Project</th>
<th>Description</th>
<th>Status</th>
<th>Website</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<!-- MODAL -->

<div class="modal fade"
id="projectModal">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5>
Add / Update Project
</h5>

<button class="btn-close btn-close-white"
data-bs-dismiss="modal"></button>

</div>

<div class="modal-body">

<form id="projectForm">

<input type="hidden"
id="projectId">

<div class="row">

<div class="col-md-6 mb-3">

<label>
Project Name
</label>

<input type="text"
id="projectName"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>
Image URL
</label>

<input type="text"
id="projectImage"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>
Website URL
</label>

<input type="text"
id="projectUrl"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>
Status
</label>

<select id="projectStatus"
class="form-select">

<option>
Active
</option>

<option>
Pending
</option>

<option>
Completed
</option>

</select>

</div>

<div class="col-12 mb-3">

<label>
Description
</label>

<textarea id="projectDesc"
class="form-control"></textarea>

</div>

</div>

<button class="btn-main w-100">

Save Project

</button>

</form>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
updateDoc,
doc,
getDoc
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

import {
getMessaging,
getToken,
onMessage
}
from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js';


/* FIREBASE CONFIG */

const firebaseConfig = {

apiKey: 'AIzaSyAlOrIXWqq1XEe1ya6UYx_csH6ckvo_x84',

authDomain: 'project-dashboard-ee104.firebaseapp.com',

projectId: 'project-dashboard-ee104',

storageBucket: 'project-dashboard-ee104.firebasestorage.app',

messagingSenderId: '462837501926',

appId: '1:462837501926:web:aed16fc192890d16115027',

measurementId: 'G-0FDEWTYKB2'

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

const messaging = getMessaging(app);

const projectRef = collection(db,'projects');

const modal =
new bootstrap.Modal(
document.getElementById('projectModal')
);

let table;


if ('serviceWorker' in navigator) {

navigator.serviceWorker.register(
'./firebase-messaging-sw.js'
)
.then((registration)=>{

console.log('Service Worker Registered');

})
.catch((error)=>{

console.log(error);

});

}

/* NOTIFICATION */

async function initNotification(){

try{

const permission =
await Notification.requestPermission();

if(permission === 'granted'){

const token =
await getToken(messaging,{

vapidKey:
'BHxU6wPSAJy1GjtgwERuZRrMHU3AFlaZxaWRgkTsJkYiHZ7QeNAjsXmLrwx8KG-527JacIAtBpSu_-CQrJ4lgBk'

});

console.log('FCM TOKEN:',token);

}

}catch(error){

console.log(error);

}

}

initNotification();


/* FOREGROUND MESSAGE */

onMessage(messaging,(payload)=>{

console.log(payload);

alert(payload.notification.title);

});


/* LOAD PROJECTS */

async function loadProjects() {

const snapshot =
await getDocs(projectRef);

const tbody =
document.getElementById('tableBody');


/* DESTROY DATATABLE */

if ($.fn.DataTable.isDataTable('#projectTable')) {

$('#projectTable').DataTable().destroy();

}


/* CLEAR TABLE */

tbody.innerHTML = '';

let count = 1;


/* APPEND ROWS */

snapshot.forEach((item) => {

const project = item.data();

let statusClass = 'active';

if (project.status === 'Pending') {

statusClass = 'pending';

}

if (project.status === 'Completed') {

statusClass = 'completed';

}

tbody.innerHTML += `

<tr>

<td>${count++}</td>

<td>

<img src="${project.image}"
class="project-img">

</td>

<td>

<b>${project.name}</b>

</td>

<td>

${project.description || '-'}

</td>

<td>

<span class="status ${statusClass}">
${project.status}
</span>

</td>

<td>

<a href="${project.url}"
target="_blank"
class="visit-btn">

Open

</a>

</td>

<td>

<button class="action-btn edit-btn"
onclick="editProject('${item.id}')">

<i class="fa fa-pen"></i>

</button>

<button class="action-btn delete-btn"
onclick="deleteProject('${item.id}')">

<i class="fa fa-trash"></i>

</button>

</td>

</tr>

`;

});


/* REINITIALIZE DATATABLE */

table = $('#projectTable').DataTable({

responsive: true,

pageLength: 5,

destroy: true

});

}


/* EDIT */

window.editProject = async function(id){

const ref = doc(db,'projects',id);

const snap = await getDoc(ref);

if(snap.exists()){

const data = snap.data();

projectId.value = id;

projectName.value = data.name;

projectImage.value = data.image;

projectUrl.value = data.url;

projectDesc.value = data.description;

projectStatus.value = data.status;

modal.show();

}

}


/* DELETE */

window.deleteProject = async function(id){

if(confirm('Delete Project?')){

await deleteDoc(doc(db,'projects',id));

alert('Project Deleted');

loadProjects();

}

}


/* SAVE */

projectForm.addEventListener('submit', async(e)=>{

e.preventDefault();

const id = projectId.value;

const data = {

name: projectName.value,

image: projectImage.value,

url: projectUrl.value,

description: projectDesc.value,

status: projectStatus.value

};

if(id){

await updateDoc(doc(db,'projects',id),data);

alert('Project Updated');

}else{

await addDoc(projectRef,data);

alert('Project Added');

}

projectForm.reset();

projectId.value='';

modal.hide();

loadProjects();

});


/* SEARCH */

searchInput.addEventListener('keyup',function(){

if(table){

table.search(this.value).draw();

}

});


/* FILTER */

statusFilter.addEventListener('change',function(){

if(table){

table.column(4)
.search(this.value)
.draw();

}

});


/* INITIAL LOAD */

loadProjects();

</script>

</body>

</html>
