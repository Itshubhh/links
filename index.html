<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhatsApp Chat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#111b21;
height:100vh;
overflow:hidden;
}

.chat-wrapper{
display:flex;
height:100vh;
}

/* LEFT */

.sidebar{
width:350px;
background:#202c33;
border-right:1px solid #2a3942;
display:flex;
flex-direction:column;
}

.sidebar-header{
padding:15px;
background:#202c33;
color:white;
font-weight:bold;
border-bottom:1px solid #2a3942;
}

.search-box{
padding:10px;
background:#111b21;
}

.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#2a3942;
color:white;
}

.user-list{
flex:1;
overflow:auto;
}

.user{
display:flex;
align-items:center;
padding:12px;
cursor:pointer;
border-bottom:1px solid #2a3942;
}

.user:hover{
background:#2a3942;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:#25d366;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-weight:bold;
margin-right:10px;
}

.user-info{
flex:1;
color:white;
}

.online-dot{
width:10px;
height:10px;
background:#25d366;
border-radius:50%;
}

/* RIGHT */

.chat-area{
flex:1;
display:flex;
flex-direction:column;
background:#0b141a;
}

.chat-header{
height:65px;
background:#202c33;
display:flex;
align-items:center;
padding:0 20px;
color:white;
}

.chat-header .avatar{
margin-right:10px;
}

.status{
font-size:12px;
color:#8696a0;
}

.chat-body{
flex:1;
padding:20px;
overflow:auto;
background:url('https://i.imgur.com/lQq9l7G.png');
}

.message-row{
display:flex;
margin-bottom:10px;
}

.message-row.me{
justify-content:flex-end;
}

.message{
max-width:65%;
padding:10px;
border-radius:8px;
position:relative;
}

.me .message{
background:#005c4b;
color:white;
}

.other .message{
background:#202c33;
color:white;
}

.time{
font-size:11px;
opacity:.7;
text-align:right;
margin-top:5px;
}

.chat-footer{
padding:10px;
background:#202c33;
display:flex;
gap:10px;
}

.chat-footer input{
flex:1;
padding:12px;
border:none;
border-radius:8px;
background:#2a3942;
color:white;
}

.send-btn{
background:#25d366;
border:none;
padding:0 25px;
border-radius:8px;
color:white;
font-weight:bold;
}

.typing{
padding:0 20px;
color:#25d366;
font-size:12px;
height:20px;
}

</style>

</head>

<body>

<div class="chat-wrapper">

<!-- LEFT -->

<div class="sidebar">

<div class="sidebar-header">
WhatsApp Firebase
</div>

<div class="search-box">

<input
type="text"
placeholder="Search User">

</div>

<div class="user-list">

<div class="user">

<div class="avatar">
S
</div>

<div class="user-info">

<div>
Shubham
</div>

<small>
Online
</small>

</div>

<div class="online-dot"></div>

</div>

</div>

</div>

<!-- RIGHT -->

<div class="chat-area">

<div class="chat-header">

<div class="avatar">
S
</div>

<div>

<div id="chatUser">
Shubham
</div>

<div
class="status"
id="userStatus">

Online

</div>

</div>

</div>

<div
class="typing"
id="typingBox">

</div>

<div
class="chat-body"
id="chatBox">

</div>

<div class="chat-footer">

<input
type="text"
id="message"
placeholder="Type message">

<button
class="send-btn"
onclick="sendMessage()">

Send

</button>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
query,
orderBy,
onSnapshot,
serverTimestamp,
setDoc,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyAlOrIXWqq1XEe1ya6UYx_csH6ckvo_x84",

authDomain:
"project-dashboard-ee104.firebaseapp.com",

projectId:
"project-dashboard-ee104",

storageBucket:
"project-dashboard-ee104.firebasestorage.app",

messagingSenderId:
"462837501926",

appId:
"1:462837501926:web:aed16fc192890d16115027"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);


/* USER */

let currentUser =
localStorage.getItem("chat_user");

if(!currentUser){

currentUser =
prompt("Enter Your Name");

localStorage.setItem(
"chat_user",
currentUser
);

}

/* COLLECTIONS */

const messagesRef =
collection(
db,
"chat_messages"
);

/* ONLINE */

await setDoc(
doc(db,"users",currentUser),
{
name:currentUser,
online:true,
last_seen:new Date()
},
{
merge:true
}
);

/* OFFLINE */

window.addEventListener(
"beforeunload",
async ()=>{

await setDoc(
doc(db,"users",currentUser),
{
online:false,
last_seen:new Date()
},
{
merge:true
}
);

}
);

/* SEND MESSAGE */

window.sendMessage =
async function(){

let msg =
document
.getElementById("message")
.value
.trim();

if(!msg) return;

await addDoc(
messagesRef,
{
user:currentUser,
message:msg,
seen:false,
created_at:
serverTimestamp(),
time:
new Date()
.toLocaleTimeString()
}
);

document
.getElementById("message")
.value="";

};

/* ENTER SEND */

document
.getElementById("message")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){

sendMessage();

}

}
);

/* TYPING */

let typingTimeout;

document
.getElementById("message")
.addEventListener(
"input",
async ()=>{

await setDoc(
doc(
db,
"typing",
currentUser
),
{
typing:true,
user:currentUser
}
);

clearTimeout(
typingTimeout
);

typingTimeout =
setTimeout(
async ()=>{

await setDoc(
doc(
db,
"typing",
currentUser
),
{
typing:false,
user:currentUser
}
);

},
1000
);

}
);

/* SHOW TYPING */

onSnapshot(
collection(db,"typing"),
(snapshot)=>{

let text = "";

snapshot.forEach((d)=>{

let data =
d.data();

if(
data.user !== currentUser &&
data.typing
){

text =
data.user +
" is typing...";

}

});

document
.getElementById(
"typingBox"
)
.innerHTML =
text;

}
);

/* REALTIME CHAT */

const q =
query(
messagesRef,
orderBy(
"created_at",
"asc"
)
);

onSnapshot(
q,
(snapshot)=>{

let html="";

snapshot.forEach((doc)=>{

let data =
doc.data();

let mine =
data.user === currentUser;

html += `

<div class="
message-row
${mine?'me':'other'}
">

<div class="message">

<b>
${data.user}
</b>

<br>

${data.message}

<div class="time">

${data.time || ''}

${mine ? ' ✓✓' : ''}

</div>

</div>

</div>

`;

});

document
.getElementById(
"chatBox"
)
.innerHTML =
html;

document
.getElementById(
"chatBox"
)
.scrollTop =
document
.getElementById(
"chatBox"
)
.scrollHeight;

}
);

/* ONLINE STATUS */

onSnapshot(
doc(
db,
"users",
currentUser
),
async ()=>{}
);

</script>

</body>
</html>
